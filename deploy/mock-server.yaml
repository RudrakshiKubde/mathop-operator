apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-server
  template:
    metadata:
      labels:
        app: mock-server
    spec:
      containers:
      - name: mock-server
        image: mock-server:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: mock-server
  namespace: default
spec:
  selector:
    app: mock-server
  ports:
  - port: 9090
    targetPort: 9090