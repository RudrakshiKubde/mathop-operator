# This rule is not used by the project mathop-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the math.example.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mathop-operator
    app.kubernetes.io/managed-by: kustomize
  name: workflow-editor-role
rules:
- apiGroups:
  - math.example.com
  resources:
  - workflows
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - math.example.com
  resources:
  - workflows/status
  verbs:
  - get
